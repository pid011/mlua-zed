name = "mLua"
grammar = "lua"
path_suffixes = ["mlua"]
line_comments = ["-- "]
tab_size = 4
hard_tabs = true
autoclose_before = ";:.,=}])>"
brackets = [
    { start = "{", end = "}", close = true, newline = true },
    { start = "[", end = "]", close = true, newline = true },
    { start = "(", end = ")", close = true, newline = true },
    { start = "\"", end = "\"", close = true, newline = false, not_in = ["string"] },
    { start = "'", end = "'", close = true, newline = false, not_in = ["string"] },
]

increase_indent_pattern = "^\\s*((do|then|else|function|repeat|while|method|handler|script)\\b.*|.*\\{\\s*)$"
decrease_indent_pattern = "^\\s*((else|elseif|end|until)\\b|\\}|\\))"
